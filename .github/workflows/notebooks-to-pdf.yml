name: Convert notebooks to PDF (HTML pipeline)

on:
  push:
    branches:
      - main

jobs:
  build-pdfs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install nbconvert notebook nbformat

      - name: Install system deps (HTML → PDF)
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc wkhtmltopdf

      - name: Convert notebooks to HTML
        run: |
          mkdir -p build_html
          for file in $(find . -name "*.ipynb"); do
            echo "Converting $file -> HTML"
            jupyter nbconvert "$file" \
              --to html \
              --output-dir build_html
          done

      - name: Convert HTML to PDF
        run: |
          mkdir -p pdfs
          for file in build_html/*.html; do
            echo "Converting $file -> PDF"
            wkhtmltopdf "$file" "pdfs/$(basename "${file%.html}.pdf")"
          done

      - name: Commit PDFs back to repo
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add pdfs/*.pdf || true
          git commit -m "Update generated PDFs" || echo "No changes"
          git push || echo "No changes"